# Free Supabase projects pause after ~7 idle days. This pings the
# `request` function (GET = ping, which touches the DB) twice a week.
name: keep-supabase-alive
on:
  schedule:
    - cron: '17 9 * * 1,4'   # Mon & Thu 09:17 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the genny API
        run: |
          # Filled in at deploy time (same commit that sets assets/api.js)
          URL="https://YOUR-PROJECT-REF.supabase.co/functions/v1/request"
          if [[ "$URL" == *"YOUR-PROJECT-REF"* ]]; then
            echo "API not configured yet — skipping."
            exit 0
          fi
          curl -fsS "$URL" && echo " — alive"
